# 生产环境 Docker Compose（使用云端数据库）
version: '3.8'

services:
  backend:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    container_name: video-mixer-backend
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/knowledge:/app/knowledge-base
      - ./data/articles:/app/articles
    ports:
      - "3001:3001"

  frontend:
    build:
      context: ../frontend
      dockerfile: ../deploy/Dockerfile.frontend
      args:
        - VITE_API_BASE_URL=
    container_name: video-mixer-frontend
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
      - ./data/uploads:/var/www/uploads
    ports:
      - "80:80"
      - "443:443"

volumes:
  uploads:
  knowledge:
  articles:
