<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remotion Publisher</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .header {
      text-align: center;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 18px;
      margin: 0 0 8px 0;
      color: #333;
    }
    .status {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status.online {
      background: #e8f5e9;
      border: 1px solid #4caf50;
    }
    .status.offline {
      background: #ffebee;
      border: 1px solid #f44336;
    }
    .status-icon {
      font-size: 20px;
    }
    .status-text {
      flex: 1;
      font-size: 14px;
    }
    .info {
      font-size: 12px;
      color: #666;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Remotion Publisher</h1>
  </div>

  <div id="status" class="status offline">
    <span class="status-icon">🔴</span>
    <span class="status-text">正在连接...</span>
  </div>

  <div class="info">
    <p>扩展版本: <span id="version">1.0.0</span></p>
    <p>后台任务管理器正在运行中</p>
  </div>

  <script src="../dist/popup/index.js"></script>
</body>
</html>
