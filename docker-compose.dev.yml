version: '3.8'

services:
  # 本地开发数据库
  postgres-dev:
    image: pgvector/pgvector:pg15
    container_name: remotion-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
      POSTGRES_DB: remotion_video_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 数据库管理工具（可选）
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: remotion-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres-dev
    restart: unless-stopped
    profiles: ["tools"]  # 可选服务，需要时用 --profile tools 启动

volumes:
  postgres_dev_data:
